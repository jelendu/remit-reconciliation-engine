name: Scheduled data refresh

# Live-feed simulator: every 30 minutes, append one synthetic remit cycle,
# rebuild + retest the dbt project, and commit the refreshed warehouse.
# Streamlit Community Cloud watches the repo and redeploys on the commit,
# so the public dashboard picks up each new cycle automatically.
#
# Notes:
# - GitHub may delay scheduled runs by a few minutes under load.
# - GitHub auto-disables schedules after ~60 days without repo activity;
#   the runs themselves count as activity once this is committing.

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Append synthetic batch, reload DuckDB, dbt build
        run: python orchestration/refresh.py

      - name: Commit refreshed warehouse
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data_gen/output warehouse/raw.duckdb
          if git diff --cached --quiet; then
            echo "nothing changed, skipping commit"
            exit 0
          fi
          batch=$(python -c "import pandas as pd; print(sorted(pd.read_csv('data_gen/output/remits.csv').batch_id.unique())[-1])")
          git commit -m "chore: scheduled synthetic refresh ($batch)"
          git pull --rebase origin main
          git push
