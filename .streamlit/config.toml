# Claude-inspired warm theme: light tan surfaces from the terracotta hue
# family (#D97757), warm near-black ink. The app renders identically for
# every visitor; styled table rows always pair background with text color.
[theme]
base = "light"
primaryColor = "#D97757"
backgroundColor = "#F4E9DD"
secondaryBackgroundColor = "#EBDCCB"
textColor = "#201A15"

[server]
headless = true
